<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Add Prescription</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>Add Prescription</h2>

<form id="form">

<label>Patient Name / Mobile</label>
<input type="text" name="patient" required>

<label>Doctor</label>
<input type="text" name="doctor" required>

<label>Diagnosis</label>
<textarea name="diagnosis" required></textarea>

<label>Date</label>
<input type="date" name="date" required>

<label>Prescription Image</label>
<input type="file" name="image">

<button type="submit" class="btn">
Save Prescription
</button>

</form>

</div>

<script>

/* ROLE CHECK */

console.log("PRESCRIPTION JS LOADED ✅");

/* ROLE CHECK */
const user = JSON.parse(localStorage.getItem("user"));

if (!user || user.role !== "doctor") {
    alert("Doctor access only");
    window.location.href = "HOME/index.html";
}

/* FORM SUBMIT */
document.getElementById("form").addEventListener("submit", async (e) => {

    e.preventDefault();

    console.log("Form Submit Triggered ✅");

    const formData = new FormData(e.target);

    const token = localStorage.getItem("token");

    if (!token) {
        alert("Login required ❌");
        return;
    }

    try {

        const response = await fetch("https://slvc-clinic-management-production.up.railway.app/api/prescriptions", {
            method: "POST",
            headers: {
                Authorization: "Bearer " + token
            },
            body: formData
        });

        const data = await response.json();

        console.log("API RESPONSE:", data);

        if (response.ok && data.success) {
            alert("Prescription Saved ✅");
            e.target.reset();
        } else {
            alert("Error: " + (data.message || "Failed"));
        }

    } catch (err) {
        console.error("ERROR:", err);
        alert("Network error ❌");
    }

});


</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Add Prescription</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>Add Prescription</h2>

<form id="form">

<label>Patient Name / Mobile</label>
<input type="text" name="patient" required>

<label>Doctor</label>
<input type="text" name="doctor" required>

<label>Diagnosis</label>
<textarea name="diagnosis" required></textarea>

<label>Date</label>
<input type="date" name="date" required>

<label>Prescription Image</label>
<input type="file" name="image">

<button type="submit" class="btn">
Save Prescription
</button>

</form>

</div>

<script>
document.getElementById("form").addEventListener("submit", async (e) => {

    e.preventDefault();

    const formData = new FormData(e.target);

    const user = JSON.parse(localStorage.getItem("user"));
    if(user){
        formData.append("ptid", user.id); // ✅ इथे add कर
    }

    const token = localStorage.getItem("token");

    try {
        const res = await fetch("https://slvc-clinic-management-production.up.railway.app/api/prescriptions", {
            method: "POST",
            headers: {
                Authorization: token ? "Bearer " + token : ""
            },
            body: formData
        });

        const data = await res.json();

        if (res.ok) {
            alert("Prescription Saved ✅");

            // ✅ DIRECT VIEW PAGE ला redirect
            window.location.href = "viewPrescription.html";
        } else {
            alert("Error: " + data.message);
        }

    } catch (err) {
        console.error(err);
        alert("Network Error ❌");
    }

});
</script>

</body>
</html>

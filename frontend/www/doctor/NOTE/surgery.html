<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Surgery</title>
<link rel="stylesheet" href="surgery.css">
</head>

<body>

<nav class="navbar">
<img src="SLVC-logo.png" class="logo">
</nav>

<div class="form-box">

<h3 id="formTitle">Procedure Details</h3>

<input type="text" id="procedureName" placeholder="Procedure Name">
<input type="text" id="patientName" placeholder="Patient Name">
<input type="text" id="hospitalName" placeholder="Hospital Name">
<input type="text" id="noteName" placeholder="Note">
<input type="date" id="surgeryDate">

<div class="btn-row">
<button type="button" class="primary-btn" onclick="saveSurgery()">Save</button>
<a href="surgery-main.html" class="link-btn">View All</a>
</div>

</div>

<script>

const STORAGE_KEY="surgeries";

let surgeries=JSON.parse(localStorage.getItem(STORAGE_KEY))||[];

let editIndex = localStorage.getItem("editSurgeryIndex");
let viewIndex = localStorage.getItem("viewSurgeryIndex");

editIndex = editIndex !== null ? parseInt(editIndex) : null;
viewIndex = viewIndex !== null ? parseInt(viewIndex) : null;

document.addEventListener("DOMContentLoaded",()=>{

const name=document.getElementById("procedureName");
const patient=document.getElementById("patientName");
const hospital=document.getElementById("hospitalName");
const note=document.getElementById("noteName");
const date=document.getElementById("surgeryDate");

const title=document.getElementById("formTitle");

/* VIEW MODE */

if(viewIndex!==null){

title.innerText="View Surgery";

let s=surgeries[viewIndex];

name.value=s.name;
patient.value=s.patient;
hospital.value=s.hospital;
note.value=s.note;
date.value=s.date;

name.disabled=true;
patient.disabled=true;
hospital.disabled=true;
note.disabled=true;
date.disabled=true;

document.querySelector(".primary-btn").style.display="none";

}

/* EDIT MODE */

else if(editIndex!==null){

title.innerText="Edit Surgery";

let s=surgeries[editIndex];

name.value=s.name;
patient.value=s.patient;
hospital.value=s.hospital;
note.value=s.note;
date.value=s.date;

}

/* ADD MODE */

else{

title.innerText="Add Surgery";

}

});


/* SAVE SURGERY */
async function saveSurgery() {
    const name = document.getElementById("procedureName").value.trim();
    const patient = document.getElementById("patientName").value.trim();
    const hospital = document.getElementById("hospitalName").value.trim();
    const note = document.getElementById("noteName").value.trim();
    const date = document.getElementById("surgeryDate").value;

    if (!name || !patient || !hospital || !date) {
        alert("Please fill all fields");
        return;
    }

    // 1. Data Object tayar kara
    let surgeryLocal = { name, patient, hospital, note, date };

    // 2. Local Storage madhe save kara (Ya mule 'View All' madhe data disel)
    if (editIndex !== null) {
        surgeries[editIndex] = surgeryLocal;
        localStorage.removeItem("editSurgeryIndex");
    } else {
        surgeries.push(surgeryLocal);
    }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(surgeries));

    // 3. Fake Success Alert (Demo sathi)
    alert("Surgery Saved Successfully! ✅");
    
    // 4. Redirect kara
    window.location.href = "surgery-main.html";

    // टीप: जर तुम्हाला बॅकएंडला सुद्धा डेटा पाठवायचा प्रयत्न करायचा असेल, 
    // तर वरचा कोड तसाच ठेवून फक्त fetch() ला try-catch मध्ये शांतपणे चालू ठेवा.
}


document.addEventListener("DOMContentLoaded", () => {
    const saveBtn = document.querySelector(".primary-btn");
    
    if (saveBtn) {
        // Direct event listener lavne mobile sathi jasta secure aahe
        saveBtn.addEventListener("click", function(e) {
            e.preventDefault();
            console.log("Button clicked on Android!");
            
            // Ithe check kara tumchya function che naav kay aahe
            if (typeof saveSurgery === "function") {
                saveSurgery();
            } else if (typeof saveNote === "function") {
                saveNote();
            } else {
                alert("Error: Save function sapadat nahiye!");
            }
        });
    }
});
</script>

</body>
</html>

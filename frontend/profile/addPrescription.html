<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Add Prescription</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>Add Prescription</h2>

<form id="form">

<label>Patient Name / Mobile</label>
<input type="text" name="patient" required>

<label>Doctor</label>
<input type="text" name="doctor" required>

<label>Diagnosis</label>
<textarea name="diagnosis" required></textarea>

<label>Date</label>
<input type="date" name="date" required>

<label>Prescription Image</label>
<input type="file" name="image">

<button type="submit" class="btn">
Save Prescription
</button>

</form>

</div>

<script>

/* ROLE CHECK */

const user = JSON.parse(localStorage.getItem("user"));

if(!user || user.role !== "doctor"){

alert("Doctor access only");

window.location.href="HOME/index.html";

}

document.getElementById("form").addEventListener("submit",async(e)=>{

e.preventDefault();

const formData = new FormData(e.target);

const token = localStorage.getItem("token");

const res = await fetch("https://slvc-clinic-management-production.up.railway.app/api/prescriptions",{

method:"POST",

headers:{
Authorization:"Bearer "+token
},

body:formData

});

const data = await res.json();

alert(data.message);

e.target.reset();

});

</script>

</body>
</html>

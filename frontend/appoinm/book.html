<body>
<!-- slvc logo on the middle or top of the appoinment table-->
   <div class="form-container">
        <header class="form-header">
            <img src="SLVC-logo.png" alt="SLVC Logo">
            
            <h2>Book Appointment</h2>
        </header>

        <form action="#" method="POST" class="appointment-form-grid">

            <div class="form-column" id="personal-details-column">
                <h3 class="form-section-title">Personal Details</h3>
            
                <div class="form-group">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="mobile">Mobile No:</label>
                    <input type="tel" id="mobile" name="mobile" required>
                </div>

                <div class="form-group">
                    <label for="address">Address:</label>
                    <input type="text" id="address" name="address">
                </div>
            </div>

            <div class="form-column" id="appointment-details-column">
                <h3 class="form-section-title">Appointment Details</h3>
            
                <div class="form-group">
                    <label>Appointment Type:</label>
                    <div class="radio-group">
                        <input type="radio" id="opd" name="appointment_type" value="OPD" checked>
                        <label for="opd">OPD (In-person)</label>
                        <input type="radio" id="video" name="appointment_type" value="Video">
                        <label for="video">Video Consultation</label>
                    </div>
                </div>

                <div class="flex-group">
                    <div class="form-group">
                        <label for="date">Date:</label>
                        <input type="date" id="date" name="date" required>
                    </div>
                    
                    <div class="form-group">
  <label for="slot">Evening Time Slot:</label>
  <select id="slot" name="slot" required>
    <option value="">Select Slot</option>
  </select>
</div>


                </div>

                <div class="form-group">
                    <label for="reference">Reference :</label>
                    <textarea id="reference" name="reference" rows="4"></textarea>
                </div>

<button type="button" class="submit-btn" onclick="confirmAppointment()">
CONFIRM APPOINTMENT
</button>
            </div>

            <!-- confirm.html -->


    </div>

  <script src="book.js"></script>
</body>

<!DOCTYPE html>
<html>
<head>
<title>Doctor Dashboard</title>

<link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css' rel='stylesheet'/>
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:"Segoe UI",Arial,sans-serif;
background:linear-gradient(135deg,#eaf0ff,#dbe7ff);
}

/* NAVBAR */

.nav{
background:linear-gradient(90deg,#193388,#0b5ed7);
color:white;
padding:14px 16px;
font-size:18px;
font-weight:600;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
padding:16px;
max-width:500px;
margin:auto;
}

/* CARD */

.card{
background:white;
padding:22px 10px;
border-radius:14px;
box-shadow:0 5px 14px rgba(0,0,0,0.1);
text-align:center;
cursor:pointer;
font-size:15px;
font-weight:600;
color:#193388;
position:relative;
overflow:hidden;
transition:all .3s ease;
}

/* VEINS EFFECT */

.card::before{
content:"";
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:radial-gradient(circle,rgba(25,51,136,0.08) 10%,transparent 60%);
transform:rotate(25deg);
}

/* HOVER */

.card:hover{
transform:translateY(-5px) scale(1.02);
box-shadow:0 8px 18px rgba(0,0,0,0.15);
}

/* CARD CIRCLE EFFECT */

.card::after{
content:"";
position:absolute;
bottom:-25px;
right:-25px;
width:90px;
height:90px;
background:rgba(25,51,136,0.05);
border-radius:50%;
}

/* TABLET */

@media(min-width:600px){

.grid{
grid-template-columns:repeat(3,1fr);
max-width:700px;
}

}

/* DESKTOP */

@media(min-width:900px){

    .nav{
        width: auto;
        height: 100px;
        font-size: 35px;
    }
.grid{
grid-template-columns:repeat(1,1fr);
max-width:600px;
padding:40px;
}

.card{
font-size:30px;
padding:30px 15px;
}

}
</style>

</head>

<body>

<body class="doctor-page">

<div class="nav">
SLVC Clinic Management Dashboard
</div>

<div class="grid">

<div class="card" onclick="location.href='calender/calci.html'">
Appointments
</div>

<div class="card" onclick="location.href='../profile/addPrescription.html'">
Add Prescription
</div>

<div class="card" onclick="location.href='photos/photos.html'">
Photos
</div>

<div class="card" onclick="location.href='stories/stories.html'">
Stories
</div>

<div class="card" onclick="location.href='NOTE/main.html'">
Notes
</div>

<div class="card" onclick="location.href='NOTE/surgery-main.html'">
Surgeries
</div>

<div class="card" onclick="location.href='../HOME/index.html'">
Home 
</div>

</div>

<script src="../../js/roleCheck.js"></script>

</body>


<script>

    //restrict for pt 
   document.addEventListener("DOMContentLoaded", function(){

const user = JSON.parse(localStorage.getItem("user"));

if(!user){

alert("Please login first");
window.location.href="../../login/login.html";
return;

}

if(user.role !== "doctor"){

alert("Doctor access only");
window.location.href="../../HOME/index.html";

}

});

</script>

</body>
</html>

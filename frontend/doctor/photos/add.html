<!-- Add Patient Page -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Patient</title>
    <style>
        body {
            background-color: #ffffff;
            font-family: Arial, sans-serif;
            padding: 20px;
            color: #221d79;
        }

        h2 {
            text-align: center;
            color: #221d79;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 15px;
        }

        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #221d79;
            border-radius: 8px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #221d79;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .back-btn {
            background-color: rgb(193, 227, 232);
            color: #221d79;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2>Add New Patient</h2>

    <div class="form-group">
        <label>Patient Name</label>
        <input type="text" id="pname" placeholder="Enter Patient Name">
    </div>

    <div class="form-group">
        <label>Patient Problem</label>
        <input type="text" id="pproblem" placeholder="Enter Problem Details">
    </div>

    <div class="form-group">
        <label>Before Image</label>
        <input type="file" id="beforeImg" accept="image/*">
    </div>

    <div class="form-group">
        <label>After Image</label>
        <input type="file" id="afterImg" accept="image/*">
    </div>

  <button id="saveBtn" onclick="savePatient()">Save</button>

    <a href="photos.html"><button class="back-btn">Back</button></a>

<script>

//restrict for pt 
const user = JSON.parse(localStorage.getItem("user"));

if(!user || user.role !== "doctor"){

alert("Doctor only");

window.location.href="photos.html";

}



async function savePatient() {

    const saveBtn = document.getElementById("saveBtn");

    // disable button
    saveBtn.disabled = true;
    saveBtn.innerText = "Saving...";

    const name = document.getElementById("pname").value;
    const problem = document.getElementById("pproblem").value;
    const before = document.getElementById("beforeImg").files[0];
    const after = document.getElementById("afterImg").files[0];

    if (!name || !problem || !before || !after) {
        alert("Please fill all fields");
        saveBtn.disabled = false;
        saveBtn.innerText = "Save";
        return;
    }

    const formData = new FormData();

    formData.append("ptname", name);
    formData.append("problem", problem);
    formData.append("before", before);
    formData.append("after", after);

    try {

        const res = await fetch("http://10.0.2.2:5000/api/photos/upload", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        if (data.success) {

            alert("Patient Saved Successfully!");
            window.location.href = "photos.html";

        } else {

            alert("Error saving patient: " + data.error);
            saveBtn.disabled = false;
            saveBtn.innerText = "Save";

        }

    } catch (err) {

        console.error(err);
        alert("Server error");
        saveBtn.disabled = false;
        saveBtn.innerText = "Save";

    }

}

</script>

</body>
</html>
